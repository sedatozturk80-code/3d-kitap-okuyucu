<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>3D Tablet E-Kitap Okuyucu</title>
    
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#3c3f41">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3389/3389081.png">

    <style>
        body {
            background-color: #3c3f41;
            margin: 0;
            overflow: auto; 
            font-family: Arial, sans-serif;
            transition: background-color 0.3s ease;
        }

        /* --- TABLET İÇİN YENİ YÜZEN MENÜ --- */
        #toolbar {
            position: fixed;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            padding: 10px;
            border-radius: 30px;
            display: flex;
            gap: 10px;
            z-index: 1000;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
        }

        .toolbar-btn {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 20px;
            font-weight: bold;
            cursor: pointer;
            font-size: 14px;
            transition: transform 0.1s ease, background 0.2s ease;
        }
        .toolbar-btn:active { transform: scale(0.95); }
        .btn-theme { background: #FF9800; }
        .btn-zoom { background: #2196F3; }
        .btn-mode { background: #9C27B0; }

        /* Gizli dosya seçici */
        #pdf-upload { display: none; }

        #loading-text {
            color: #ffffff;
            font-size: 20px;
            display: none;
            position: fixed; 
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
            background: rgba(0,0,0,0.8);
            padding: 15px 30px;
            border-radius: 8px;
        }
        
        #zoom-indicator {
            position: fixed; 
            top: 80px; /* Menünün altına aldık */
            right: 20px;
            color: white;
            background-color: rgba(0, 0, 0, 0.7);
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
            z-index: 100;
            pointer-events: none; 
        }

        #physical-box {
            position: relative;
            transition: width 0.15s ease-out, height 0.15s ease-out, margin 0.15s ease-out;
            margin-top: 80px; /* Üst menü kitabı kapatmasın diye boşluk */
        }

        #main-container {
            transform-origin: top left; 
            transition: transform 0.15s ease-out; 
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .flip-book {
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
            display: none;
        }
        
        .page {
            background-color: white;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        canvas {
            width: 100%;
            height: 100%;
            object-fit: cover; 
        }
    </style>
</head>
<body>

    <div id="toolbar">
        <input type="file" id="pdf-upload" accept="application/pdf">
        <button class="toolbar-btn" onclick="document.getElementById('pdf-upload').click()">📂 PDF Seç</button>
        <button class="toolbar-btn btn-mode" onclick="togglePageMode()">📖 Tek/Çift</button>
        <button class="toolbar-btn btn-zoom" onclick="zoomIn()">🔍 +</button>
        <button class="toolbar-btn btn-zoom" onclick="zoomOut()">🔎 -</button>
        <button class="toolbar-btn btn-theme" onclick="toggleTheme()" id="theme-btn">☀️ Açık</button>
    </div>

    <div id="loading-text">PDF İşleniyor...</div>
    <div id="zoom-indicator">Zoom: %110</div>
    
    <div id="physical-box">
        <div id="main-container"></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/page-flip/dist/js/page-flip.browser.js"></script>

    <script>
        // PWA (İnternetsiz çalışma ve uygulama özellikleri)
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js');
        }

        let pageFlip = null;
        let currentZoom = 1.1; 
        let isSinglePage = true; 
        let canvasCache = []; 
        let currentPageIndex = 0; 
        let isDarkMode = true;

        // BROWSER (TABLET) İÇİNDEN PDF SEÇME ALGORİTMASI
        document.getElementById('pdf-upload').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    const base64Data = event.target.result.split(',')[1];
                    loadPdfFromBase64(base64Data);
                };
                reader.readAsDataURL(file);
            }
        });

        function toggleTheme() {
            isDarkMode = !isDarkMode;
            const btn = document.getElementById('theme-btn');
            if (isDarkMode) {
                document.body.style.backgroundColor = '#3c3f41';
                btn.innerText = "☀️ Açık";
            } else {
                document.body.style.backgroundColor = '#e0e0e0';
                btn.innerText = "🌙 Koyu";
            }
        }

        function updateZoomDisplay() {
            const zoomPercent = Math.round(currentZoom * 100);
            document.getElementById('zoom-indicator').innerText = `Zoom: %${zoomPercent}`;
            
            const mainContainer = document.getElementById('main-container');
            const physicalBox = document.getElementById('physical-box');

            mainContainer.style.transform = `scale(${currentZoom})`;
            
            const unscaledWidth = mainContainer.offsetWidth;
            const unscaledHeight = mainContainer.offsetHeight;
            
            const scaledWidth = unscaledWidth * currentZoom;
            const scaledHeight = unscaledHeight * currentZoom;

            physicalBox.style.width = scaledWidth + "px";
            physicalBox.style.height = scaledHeight + "px";

            if (scaledWidth < window.innerWidth) {
                physicalBox.style.marginLeft = "auto";
                physicalBox.style.marginRight = "auto";
            } else {
                physicalBox.style.marginLeft = "20px"; 
                physicalBox.style.marginRight = "20px";
            }
        }

        function zoomIn() {
            if (currentZoom < 3.0) { currentZoom += 0.10; updateZoomDisplay(); }
        }

        function zoomOut() {
            if (currentZoom > 0.3) { currentZoom -= 0.10; updateZoomDisplay(); }
        }

        // KAZARA SİLDİĞİM TEKERLEK KODU (GERİ GELDİ)
        window.addEventListener('wheel', function(e) {
            if (canvasCache.length > 0 && e.ctrlKey) {
                e.preventDefault(); 
                if (e.deltaY < 0) zoomIn(); 
                else zoomOut(); 
            }
        }, { passive: false });

        window.addEventListener('keydown', function(e) {
            if (!pageFlip) return;
            if (e.key === 'ArrowRight') pageFlip.flipNext();
            else if (e.key === 'ArrowLeft') pageFlip.flipPrev();
        });

        function togglePageMode() {
            if (canvasCache.length === 0 || !pageFlip) return;
            currentPageIndex = pageFlip.getCurrentPageIndex();
            isSinglePage = !isSinglePage;
            currentZoom = isSinglePage ? 1.1 : 0.8; 
            renderBook(); 
        }

        async function loadPdfFromBase64(base64Data) {
            const loadingText = document.getElementById('loading-text');
            loadingText.style.display = 'block';
            
            try {
                const binaryString = window.atob(base64Data);
                const len = binaryString.length;
                const bytes = new Uint8Array(len);
                for (let i = 0; i < len; i++) { bytes[i] = binaryString.charCodeAt(i); }

                const loadingTask = pdfjsLib.getDocument({data: bytes});
                const pdf = await loadingTask.promise;
                
                canvasCache = []; 
                currentPageIndex = 0; 

                for (let pageNum = 1; pageNum <= pdf.numPages; pageNum++) {
                    const page = await pdf.getPage(pageNum);
                    const viewport = page.getViewport({scale: 2.0}); 

                    const canvas = document.createElement('canvas');
                    const context = canvas.getContext('2d');
                    canvas.height = viewport.height;
                    canvas.width = viewport.width;

                    await page.render({canvasContext: context, viewport: viewport}).promise;
                    canvasCache.push(canvas); 
                    
                    loadingText.innerText = `İşleniyor: Sayfa ${pageNum} / ${pdf.numPages}`;
                }

                loadingText.style.display = 'none';
                isSinglePage = true; 
                currentZoom = 1.1; 
                renderBook(); 

            } catch (error) {
                loadingText.innerText = "Hata Oluştu: " + error.message;
            }
        }

        function renderBook() {
            const mainContainer = document.getElementById('main-container');

            if (pageFlip) { try { pageFlip.destroy(); } catch(e) {} pageFlip = null; }
            
            mainContainer.innerHTML = ''; 
            let newBook = document.createElement('div');
            newBook.id = 'book';
            newBook.className = 'flip-book';
            mainContainer.appendChild(newBook);

            canvasCache.forEach(originalCanvas => {
                const pageDiv = document.createElement('div');
                pageDiv.className = 'page';
                pageDiv.appendChild(originalCanvas); 
                newBook.appendChild(pageDiv);
            });

            newBook.style.display = 'block';

            if (isSinglePage) {
                mainContainer.style.width = "auto";
                mainContainer.style.height = "85vh"; 
                mainContainer.style.aspectRatio = "1 / 1.414"; 
                
                // İSTEDİĞİN DOKUNMATİK VE DÖNDÜRME (FIXED) AYARLARI EKLENDİ
                pageFlip = new St.PageFlip(document.getElementById('book'), {
                    width: 600, height: 848, size: "fixed", minWidth: 300, maxWidth: 2000, minHeight: 400, maxHeight: 3000, maxShadowOpacity: 0.3, showCover: false, usePortrait: true, mobileScrollSupport: true, swipeDistance: 150
                });
            } else {
                mainContainer.style.width = "95vw"; 
                mainContainer.style.height = "auto"; 
                mainContainer.style.aspectRatio = "1.414 / 1"; 
                
                // İSTEDİĞİN DOKUNMATİK VE DÖNDÜRME (FIXED) AYARLARI EKLENDİ
                pageFlip = new St.PageFlip(document.getElementById('book'), {
                    width: 450, height: 636, size: "fixed", minWidth: 300, maxWidth: 2000, minHeight: 400, maxHeight: 3000, maxShadowOpacity: 0.7, showCover: true, usePortrait: false, mobileScrollSupport: true, swipeDistance: 150
                });
            }

            pageFlip.loadFromHTML(document.querySelectorAll('.page'));
            if (currentPageIndex > 0) pageFlip.turnToPage(currentPageIndex);

            setTimeout(() => { updateZoomDisplay(); }, 100);
        }
    </script>
</body>
</html>
