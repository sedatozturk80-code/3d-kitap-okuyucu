<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Kitap Okuyucu</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/page-flip/dist/js/page-flip.browser.js"></script>
    
    <style>
        body { background-color: #1a1a1a; margin: 0; font-family: sans-serif; color: white; overflow: auto; }
        
        /* ÜST MENÜ - HER KOŞULDA GÖRÜNÜR */
        #menu {
            position: fixed; top: 0; left: 0; width: 100%; height: 60px;
            background: #333; display: flex; align-items: center; 
            justify-content: center; gap: 10px; z-index: 9999;
            border-bottom: 2px solid #444;
        }

        button {
            padding: 10px 15px; border: none; border-radius: 5px;
            font-weight: bold; cursor: pointer; color: white;
        }
        .btn-open { background: #4CAF50; }
        .btn-tool { background: #2196F3; }

        /* KİTAP ALANI */
        #content { margin-top: 80px; display: flex; justify-content: center; }
        #container { transform-origin: top center; transition: transform 0.2s; }
        .flip-book { background: #fff; box-shadow: 0 0 20px #000; display: none; }
        .page { background: white; display: flex; justify-content: center; align-items: center; border: 1px solid #ddd; }
        canvas { width: 100%; height: 100%; object-fit: contain; }

        #info { position: fixed; bottom: 10px; right: 10px; background: rgba(0,0,0,0.5); padding: 5px 10px; border-radius: 10px; }
    </style>
</head>
<body>

    <div id="menu">
        <input type="file" id="pdf-file" accept="application/pdf" style="display:none">
        <button class="btn-open" onclick="document.getElementById('pdf-file').click()">📂 PDF SEÇ</button>
        <button class="btn-tool" onclick="toggleMode()">📖 MOD</button>
        <button class="btn-tool" onclick="zoomOut()">-</button>
        <button class="btn-tool" onclick="zoomIn()">+</button>
    </div>

    <div id="content">
        <div id="container">
            <div id="book" class="flip-book"></div>
        </div>
    </div>

    <div id="info">Zoom: <span id="z-val">110</span>%</div>

    <script>
        // PDF Worker Ayarı
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

        let book = null;
        let zoom = 1.1;
        let single = true;
        let pages = [];

        // Dosya Seçme
        document.getElementById('pdf-file').onchange = function(e) {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = function() { loadPdf(this.result); };
            reader.readAsArrayBuffer(file);
        };

        async function loadPdf(data) {
            document.getElementById('menu').style.opacity = "0.5";
            const pdf = await pdfjsLib.getDocument({data: data}).promise;
            pages = [];
            for (let i = 1; i <= pdf.numPages; i++) {
                const pg = await pdf.getPage(i);
                const vp = pg.getViewport({scale: 2});
                const cvs = document.createElement('canvas');
                cvs.width = vp.width; cvs.height = vp.height;
                await pg.render({canvasContext: cvs.getContext('2d'), viewport: vp}).promise;
                pages.push(cvs);
            }
            document.getElementById('menu').style.opacity = "1";
            render();
        }

        function render() {
            if (book) book.destroy();
            const bDiv = document.getElementById('book');
            bDiv.innerHTML = '';
            pages.forEach(p => {
                const d = document.createElement('div');
                d.className = 'page';
                d.appendChild(p);
                bDiv.appendChild(d);
            });
            bDiv.style.display = "block";
            
            book = new St.PageFlip(bDiv, {
                width: single ? 600 : 450,
                height: single ? 850 : 636,
                size: "stretch",
                usePortrait: single,
                showCover: !single
            });
            book.loadFromHTML(document.querySelectorAll('.page'));
            update();
        }

        function update() {
            const c = document.getElementById('container');
            c.style.transform = `scale(${zoom})`;
            document.getElementById('z-val').innerText = Math.round(zoom * 100);
            
            // Kaydırma için boyut güncelleme
            document.getElementById('content').style.height = (c.offsetHeight * zoom + 100) + "px";
        }

        function zoomIn() { zoom += 0.1; update(); }
        function zoomOut() { if(zoom > 0.5) zoom -= 0.1; update(); }
        function toggleMode() { single = !single; render(); }
    </script>
</body>
</html>
